<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>GoFlash - Registro</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#916f6b",
                        "primary": "#b90010",
                        "on-tertiary-container": "#fbfaff",
                        "on-surface-variant": "#5d3f3c",
                        "surface-dim": "#ccdbf4",
                        "surface-container-low": "#eff4ff",
                        "primary-fixed": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#6a7487",
                        "secondary-fixed": "#dde2f3",
                        "primary-container": "#e02424",
                        "on-primary-fixed-variant": "#93000a",
                        "inverse-surface": "#223144",
                        "surface-container": "#e5eeff",
                        "tertiary": "#515b6e",
                        "surface-container-high": "#dce9ff",
                        "surface-variant": "#d4e4fc",
                        "on-primary-container": "#fff9f8",
                        "surface": "#f8f9ff",
                        "on-secondary-fixed-variant": "#414754",
                        "on-error-container": "#93000a",
                        "on-surface": "#0d1c2e",
                        "on-secondary-container": "#5e6473",
                        "surface-tint": "#c00011",
                        "tertiary-fixed-dim": "#bdc7dc",
                        "on-tertiary": "#ffffff",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary": "#585e6c",
                        "tertiary-fixed": "#d9e3f9",
                        "on-tertiary-fixed-variant": "#3d4759",
                        "background": "#f8f9ff",
                        "surface-container-highest": "#d4e4fc",
                        "secondary-fixed-dim": "#c1c6d7",
                        "secondary-container": "#dde2f3",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#121c2c",
                        "on-secondary-fixed": "#161c27",
                        "on-primary-fixed": "#410002",
                        "outline-variant": "#e6bdb8",
                        "on-background": "#0d1c2e",
                        "primary-fixed-dim": "#ffb4ab",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#ffb4ab",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-lg": "32px",
                        "gutter": "24px",
                        "container-max": "1440px",
                        "stack-md": "16px",
                        "margin-page": "40px"
                    },
                    "fontFamily": {
                        "headline-xl-mobile": ["Inter"],
                        "headline-xl": ["Inter"],
                        "caption": ["Inter"],
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-xl-mobile": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9ff; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-input:focus {
            border-color: #223144;
            ring-color: #223144;
        }
        .custom-checkbox:checked {
            background-color: #e3ce9b;
            border-color: #e3ce9b;
        }
    </style>
    <link rel="stylesheet" href="Registro.css">
</head>
<body class="min-h-screen">
    <!-- Botón de regreso corregido -->
    <div style="position:fixed; top:20px; left:20px; z-index:9999;">
        <button onclick="history.back()" style="padding:10px 20px; background:red; color:white; border:none; border-radius:5px; cursor:pointer;">
            ← Regresar
        </button>
    </div>

    <main class="flex min-h-screen flex-col md:flex-row">
        <!-- Left Side: Form Panel -->
        <section class="flex flex-col w-full md:w-1/2 bg-white px-8 md:px-20 py-12 justify-between">
            <!-- Logo Section -->
            <div class="mb-12">
                <div class="flex items-center gap-2">
                    <img src="Image-removebg-preview.png" alt="Logotipo GoFlash" width="50" height="50">
                    <a href="GoFlash2.html" class="font-headline-md text-headline-md font-bold text-primary hover:text-blue-600 transition-colors cursor-pointer">
                        GoFlash
                    </a>
                </div>
            </div>

            <!-- Form Container -->
            <div class="max-w-md w-full mx-auto md:mx-0">
                <div class="mb-stack-lg">
                    <h2 class="text-headline-xl-mobile md:text-headline-xl font-headline-xl text-on-surface mb-2">Crea tu cuenta</h2>
                    <p class="text-body-md font-body-md text-secondary">
                        ¿Ya tienes una cuenta? 
                        <a class="text-inverse-surface font-semibold hover:underline transition-all" href="#">Inicia sesión aquí</a>
                    </p>
                </div>

                <!-- Formulario de Registro -->
                <form class="space-y-stack-md" id="Registro">
                    <!--Nombre-->
                    <div class="space-y-2">
                        <label class="block text-label-md font-label-md text-on-surface" for="name">
                            Nombre completo
                        </label>
                        <input class="w-full px-4 py-3 border border-[#E2E8F0] focus:outline-none focus:ring-1 focus:ring-inverse-surface focus:border-inverse-surface transition-all text-body-md rounded-full"
                               id="name"
                               placeholder="Max Alonso"
                               type="text">
                    </div>
                    <!--Correo-->
                    <div class="space-y-2">
                        <label class="block text-label-md font-label-md text-on-surface" for="email">
                            Dirección de correo electrónico
                        </label>
                        <input class="w-full px-4 py-3 border border-[#E2E8F0] focus:outline-none focus:ring-1 focus:ring-inverse-surface focus:border-inverse-surface transition-all text-body-md rounded-full"
                               id="email"
                               placeholder="nombre.apellido2027@fbgsantiago.superate.com"
                               type="email">
                    </div>
                    <!--Clave-->
                    <div class="space-y-2">
                        <label class="block text-label-md font-label-md text-on-surface" for="password">
                            Contraseña
                        </label>
                        <input class="w-full px-4 py-3 border border-[#E2E8F0] focus:outline-none focus:ring-1 focus:ring-inverse-surface focus:border-inverse-surface transition-all text-body-md rounded-full"
                               id="password"
                               placeholder="••••••••"
                               type="password">
                    </div>
                    <!--Acepto de terminos y condiciones-->
                    <div class="flex items-center gap-3 py-2">
                        <input class="custom-checkbox w-5 h-5 border-[#E2E8F0] text-primary-container focus:ring-primary-container cursor-pointer rounded-full"
                               id="terms"
                               type="checkbox">
                        <label class="text-caption font-caption text-secondary" for="terms">
                            Acepto los <a class="underline hover:text-on-surface" href="#">Términos y Condiciones</a>
                        </label>
                    </div>
                    <!--Boton de envio-->
                    <button type="submit" class="w-full bg-primary-container text-white py-4 text-label-md font-bold tracking-widest hover:bg-[#b90010] transition-colors duration-200 uppercase rounded-full" style="transform: translateY(0px); box-shadow: none;">
                        EMPEZAR AHORA
                    </button>
                    <p class="warnings" id="warnings"></p>
                </form>

                <!-- Separador -->
                <div class="relative my-stack-lg">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-[#E2E8F0]"></div></div>
                    <div class="relative flex justify-center text-caption font-caption uppercase"><span class="bg-white px-2 text-secondary">o</span></div>
                </div>

                <!-- Botones Sociales -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button class="flex items-center justify-center gap-3 w-full py-3 border border-[#E2E8F0] hover:bg-surface transition-colors rounded-full">
                        <svg class="w-5 h-5" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"></path>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
                        </svg>
                        <span class="text-label-md font-label-md text-on-surface">Registrarse con Google</span>
                    </button>
                    <button class="flex items-center justify-center gap-3 w-full py-3 border border-[#E2E8F0] hover:bg-surface transition-colors rounded-full">
                        <span class="material-symbols-outlined text-on-surface text-[20px]">vpn_key</span>
                        <span class="text-label-md font-label-md text-on-surface">SSO</span>
                    </button>
                </div>
            </div>

            <!-- Footer Panel Izquierdo -->
            <footer class="mt-12 flex flex-wrap gap-4 justify-center md:justify-start">
                <span class="text-caption font-caption text-secondary">© 2024 SeedProd Inc.</span>
                <nav class="flex gap-4">
                    <a class="text-caption font-caption text-secondary hover:text-on-surface hover:underline" href="#">Términos de servicio</a>
                    <a class="text-caption font-caption text-secondary hover:text-on-surface hover:underline" href="#">Política de privacidad</a>
                    <a class="text-caption font-caption text-secondary hover:text-on-surface hover:underline" href="#">Seguridad</a>
                </nav>
            </footer>
        </section>

        <!-- Right Side: Visual Navy Panel -->
        <section class="hidden md:flex flex-col w-1/2 bg-inverse-surface text-on-tertiary-container relative overflow-hidden items-center justify-center p-20">
            <!-- Abstract background effect -->
            <div class="absolute inset-0 opacity-10 pointer-events-none">
                <div class="absolute top-0 right-0 w-96 h-96 bg-primary-container rounded-full blur-[100px] -translate-y-1/2 translate-x-1/2"></div>
                <div class="absolute bottom-0 left-0 w-64 h-64 bg-tertiary rounded-full blur-[80px] translate-y-1/2 -translate-x-1/2"></div>
            </div>
            <!-- Hero Illustration -->
            <div class="relative z-10 flex-grow flex items-center justify-center overflow-visible">
                <div class="relative w-full max-w-none overflow-visible">
                    <!-- Slides -->
                    <div id="heroSlider" class="flex transition-transform duration-700 ease-in-out">
                        <img src="pexels-ron-lach-9519226.jpg" class="w-[1600px] h-auto flex-shrink-0 scale-[1.5]" alt="Slide 3">
                    </div>
                </div>
            </div>
            <!-- Floating Decoration -->
            <div class="absolute bottom-10 right-10 flex flex-col items-end opacity-20">
                <span class="text-label-md font-bold text-white mb-2 uppercase tracking-widest">Enterprise Ready</span>
                <div class="h-1 w-32 bg-primary-container"></div>
            </div>
        </section>
    </main>

    <!-- Mobile Footer -->
    <footer class="md:hidden bg-white border-t border-[#E2E8F0] p-6 text-center space-y-4">
        <p class="text-caption text-secondary">© 2026 SeedProd Inc. All rights reserved.</p>
        <div class="flex justify-center gap-4">
            <a class="text-caption text-secondary underline" href="#">Privacidad</a>
            <a class="text-caption text-secondary underline" href="#">Términos</a>
            <a class="text-caption text-secondary underline" href="#">Seguridad</a>
        </div>
    </footer>

    <script>
        // Micro-interaction for inputs
        const inputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').classList.add('text-primary-container');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').classList.remove('text-primary-container');
            });
        });

        // Hover effect for the main button
        const mainBtn = document.querySelector('button[type="submit"]');
        mainBtn.addEventListener('mouseenter', () => {
            mainBtn.style.transform = 'translateY(-2px)';
            mainBtn.style.boxShadow = '0 10px 20px -10px rgba(224, 36, 36, 0.5)';
        });
        mainBtn.addEventListener('mouseleave', () => {
            mainBtn.style.transform = 'translateY(0)';
            mainBtn.style.boxShadow = 'none';
        });
    </script>
    <script src="js/registro.js"></script>
</body>
</html>
